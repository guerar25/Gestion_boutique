# ===================== APPLICATION =====================
spring.application.name=boutique-api

# ===================== SERVER =====================
server.port=8084

# ===================== DATABASE =====================
# createDatabaseIfNotExist=true est parfait pour le développement local avec XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/boutique_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# On laisse Hibernate choisir le meilleur dialecte automatiquement pour éviter les Warnings
spring.jpa.open-in-view=false

# ===================== FILE UPLOAD =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================== STORAGE DOSSIER =====================
file.upload-dir=uploads

# ===================== MAIL (GMAIL) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# REMPLACE PAR TES INFOS REELLES ICI
spring.mail.username=guerar351@gmail.com
# UTILISE UN MOT DE PASSE D'APPLICATION (16 caractères sans espaces)
spring.mail.password=tolg yhvq isbw vkta
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
